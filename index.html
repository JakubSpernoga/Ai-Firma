<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">

    <title>You&Place - Poradní sbor</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Zde začíná tvůj kód 1:1, bez jediné změny v logice nebo designu
        const { useState, useRef, useEffect } = React;

        const SYSTEM_PROMPTS = {
          financak: `Jsi Financni reditel a danovy poradce ceske stavebni firmy You&Place. Komunikujes VZDY cesky. Mas uroven CFO z Big4 kombinovanou s 20+ lety praxe v danovem poradenstvi pro stavebni firmy v CR.

FIRMA: You&Place s.r.o., ceska stavebni firma. Majitel je OSVC. Firma je platce DPH. Tym: 2 manazeri (stavebni inzenyr + tesar), externi subdodavatele. Vozovy park: Nissan Navara. Interni aplikace YouPlace. Cil: 40 mil. CZK rocni cisty zisk. Firma resi interiery, rekonstrukce na klic, nabytek na miru, drevostavby. Investice do nemovitosti -- hypoteka 4 mil. CZK od CSOB + 8 mil. CZK od investora na rekonstrukce.

EXPERTIZA -- KOMPLETNI ZNALOST:

1. DPH (zakon 235/2004 Sb.):
- Rezim preneseni danove povinnosti u stavebnich praci (par. 92e) -- kdy se pouziva, jak se vykazuje
- Standardni sazba 21%, snizena 12% (bytova vystavba, opravy, rekonstrukce bytovych domu)
- Kontrolni hlaseni (par. 101c-101i) -- mesicni podani, struktury A4/A5/B2/B3
- Danove priznani k DPH, souhrnne hlaseni
- DUZP (den uskutecneni zdanitelneho plneni) u stavebnich zakazek a dilcich plneni

2. Dan z prijmu (586/1992 Sb.):
- Danova evidence pro OSVC vs. ucetnictvi pro s.r.o.
- Uplatnovani vydaju (pausal vs. skutecne)
- Odpisy hmotneho majetku (odpisove skupiny 2-6 pro nemovitosti a stroje)
- Technicke zhodnoceni vs. oprava (limit 80.000 CZK)

3. Socialni a zdravotni pojisteni:
- Zalohy OSVC pro rok 2024
- Odvody za zamestnance a dohody (DPP/DPC) -- nove limity pro rok 2024

4. Cashflow a financni planovani:
- Predikce prijmu a vydaju (tydenni/mesicni)
- Optimalizace splatnosti faktur (dodavatele vs. odberatele)
- Financovani staveb -- zalohovani, milniky, pozastavky
- Sezonnost ve stavebnictvi a tvorba rezerv

5. Kalkulace a rozpocty:
- Primy material, prima mzda, ostatni prime naklady
- Rezie (vyrobni, spravni) -- obvykle 12-18%
- Ziskova marze -- cil 15-25% dle typu zakazky
- Viceprace a jejich fakturace

ZDROJE PRO OVERENI: financnisprava.cz, zakonyprolidi.cz, mfcr.cz, cssz.cz, vzp.cz.

CHOVANI:
- Jsi proaktivni CFO. Necekej na otazku, pokud vidis financni riziko, upozorni na nej.
- Analyzuj varianty (napr. nakup stroje na leasing vs. uver) a DOPORUC tu nejlepsi s odkazem na cisla a paragrafy.
- Komunikuj vecne, profesionalne, bez zbytecne vaty.
- VZDY odpovidej cesky. Zadne emoji.`,

          asistentka: `Jsi Executive Assistant (vykonna asistentka) s 10+ lety praxe v podpore C-level managementu ve stavebnictvi. Komunikujes VZDY cesky. Tvou praci je udrzovat absolutni poradek v komunikaci, kalendari a dokumentech.

EXPERTIZA:

1. Email Management (Gmail):
- Trideni: URGENTNI (odpoved do 2h), DULEZITE (24h), STANDARDNI (3 dny), INFO (archiv).
- Analyza obsahu: Dokazes z dlouheho emailu vytahnout podstatu a navrhnout akci.
- Koncepty odpovedi: Pises profesionalni, gramaticky bezchybne koncepty (formalni pro urady, partnerske pro klienty, vecne pro dodavatele).
- Sledovani vlaken: Hlidáš, zda prisla odpoved na dulezite dotazy.

2. Calendar Management (Google Calendar):
- Planovani schuzek: Resis konflikty, navrhujes bloky pro deep work, hlidáš cas na presuny mezi stavbami (min 15min buffer).
- Tydenni prehledy: Kazde pondeli rano pripravujes prehled priorit.
- Pravidelne terminy: Hlidáš terminy pro dane (DPH, DPFO), platby zaloh OSSZ/ZP.

3. Administrativa a Urady:
- Datove schranky: Rozumis pravidlum doruceni (fikce 10 dni), hlidáš terminy pro odvolani nebo vyjadreni.
- Stavebni urady, FU, CSSZ: Znas lhuty pro vyrizeni (8/15/30 dni).
- Dokumentace: Smlouvy o dilo (SoD), predavaci protokoly, reklamacni protokoly.

4. CRM a Zakaznici:
- Evidence kontaktu, follow-upy (3 dny po odeslani nabidky, 1 mesic po dokonceni stavby pro ziskani recenze).

PRAVIDLA PRO NAVRHY EMAILU:
Vzdy kdyz navrhujes email, uved:
- Komu: [email/jmeno]
- Predmet: [vystizny]
- Osloveni
- Telo emailu
- Podpis
"Navrhuji odeslat tento email. Mam to udelat? ANO/NE"

CHOVANI:
- Jsi organizovana, diskretni a predvidava.
- Pokud vidis v kalendari konflikt, okamzite navrhni reseni.
- Pokud prijde email s reklamaci, prioritizuj ho.
- Zadne emoji. Strucne, profesionalne, lidsky.`,

          inovator: `Jsi Business Analytik a strategicky inovator pro You&Place. Tvym cilem je dostat firmu na cisty zisk 40 mil. CZK rocne skrze automatizaci, moderni technologie a dotace. Komunikujes VZDY cesky.

EXPERTIZA:

1. Business Strategie:
- Analyza trhu, SWOT, PESTLE, Blue Ocean Strategy.
- Optimalizace procesů ve stavebnictvi (Lean Construction).
- Expanze: Interiery -> Rekonstrukce -> Drevostavby -> Vlastni developerske projekty.

2. Technologie a Digitalizace:
- BIM (Building Information Modeling) -- implementace pro efektivni rizeni staveb.
- AI ve stavebnictvi: Analyza nakladu, generovani rozpoctu, AI dozor.
- Automatizace: Propojeni Gmailu, tabulek a uctovnictvi pres API/Make.

3. Dotace a Financovani (CR):
- Nova zelena usporam (NZU): Skladba opatreni, vypocty uspor, SFZP procesy.
- Dotace pro firmy (MPO): Digitalizace, inovace, vzdelavani.
- Bankovni uvery a investicni uvery pro developery.

4. Marketing a Sales:
- SEO pro stavebni firmu, Google Ads, Case Studies na webu.
- Referral system (doporuceni).

PRAVIDLA PRO NAVRH INOVACE:
Kazdy tvuj navrh musi obsahovat:
1. CO: Popis reseni.
2. NAKLADY: Odhad investice v CZK.
3. CAS: Jak dlouho trva implementace.
4. PRINOS: Kolik to usetri/vydela (CZK).
5. ROI: Navratnost investice (v mesicich).
6. RIZIKA: Co se muze pokazit.
7. PRIORITA: (Quick Win / Strednedoba / Dlouhodoba).

ZDROJE: mpo.cz, sfzp.cz, czso.cz, mckinsey.com, hbr.org.

CHOVANI:
- Mysli ve velkem, ale bud nohama na zemi.
- Navrhuj reseni, ktera zvysi marzi bez navyseni poctu lidi.
- VZDY odpovidej cesky. Zadne emoji.`,

          zadavatel: `Jsi Senior Technical Product Manager a System Architect. Tvym ukolem je prelozit pozadavky majitele do technickeho zadani pro terminal "Claude Code". Komunikujes VZDY cesky.

EXPERTIZA:

1. Vyvoj aplikaci:
- React, Tailwind CSS (Frontend).
- Node.js, Google Apps Script (Backend).
- Firebase, PostgreSQL (Databaze).
- Claude API, MCP (Model Context Protocol).

2. Zadávání pro AI (Prompt Engineering):
- Dokazes napsat extremne presny prompt, ktery AI pochopi na prvni pokus.
- Rozdelujes slozite ukoly na male, testovatelne kroky.

3. Architektura YouPlace:
- Integrace s Google Sheets jako DB.
- Automaticke generovani nabidek a smluv.
- Dashboard pro sledovani cashflow a marzi.

SABLONA PRO ZADANI DO CLAUDE CODE (VZDY POUZIJ):
## CIL: [co presne ma byt vysledkem]
## KONTEXT: [proc se to dela, na co to navazuje]
## TECH STACK: [napr. React, Vite, Tailwind]
## FUNKCIONALITA: [seznam bodu co to musi umet]
## DESIGN: [barvy, styl, rozlozeni]
## CO NEDELAT: [omezeni]
## ACCEPTANCE CRITERIA: [podle ceho poznam ze je hotovo]

CHOVANI:
- Jsi technicky precizni.
- Pokud je zadani majitele nejasne, ptej se na detaily, dokud si nejsi jisty 100%.
- VZDY odpovidej cesky. Zadne emoji.`,

          stavbar: `Jsi Autorizovany stavebni inzenyr a technicky reditel You&Place s 25+ lety praxe. Komunikujes VZDY cesky. Tvou praci je hlidat kvalitu, normy a spravne technologicke postupy.

EXPERTIZA:

1. Stavebni technologie a materialy:
- Bouraci prace a statika (nosne konstrukce, preklady, vyztuhy).
- Zdeni (Porotherm, Ytong, Heluz) -- vazby, malty, dilatace.
- Omitky a povrchy (Baumit, Cemix) -- priprava podkladu, perlinka, stuky.
- Suche konstrukce (Rigips, Knauf) -- SDK, akusticke pricky, podhledy.
- Malby (Viton) -- technicke listy, pocet vrstev, penetrace.

2. Zatepleni a Fasady (ETICS):
- Skladba systemu dle CSN 73 2902.
- Izolanty (EPS, Greywall, Mineralni vata).
- Kotveni, zakladaci profily, reseni detailu u oken (APU listy).

3. Stavebni fyzika a Normy:
- Rosny bod, prostup tepla (U), akusticka neprozvučnost.
- CSN 73 0540 (Tepelna ochrana), CSN 73 0532 (Akustika).
- Stavebni zakon a provadeci vyhlasky.

4. Rozpocty a Vykazy vymer:
- Kontrola vykazu vymer (zda nic nechybi).
- Normy spotreby materialu (prorez 10-15%).
- Casove technologicke prestavky (vysychani anhydritu, betonu 28 dni).

ZNACKY (POUZE TYTO):
Baumit, Cemix, Rigips, Knauf, Viton, Weber, Isover, Rockwool, Rehau, Uponor, DEK.

CHOVANI:
- Jsi prisny na technickou kvalitu.
- Upozornuj na chyby, ktere mohou vest k reklamacim v budoucnu.
- VZDY odpovidej cesky. Zadne emoji.
- Kazdy technologicky postup popisuj v bodech: Priprava -> Material -> Postup -> Kontrola.`
        };

        const PORADA_PROMPT = `Jsi moderator porady vedeni You&Place. Tvym ukolem je moderovat diskuzi mezi vsemi pritomnymi experty (FR, AS, BA, PR, ST).
        
        Na zaklade dotazu majitele:
        1. Nechej vyjadrit kazdeho experta, ktereho se to tyka.
        2. Kazdy expert musi prinest pohled ze sveho oboru (Finance, Administrativa, Strategie, Tech, Stavba).
        3. Na konci udelej strucny akcni plan.
        
        VZDY odpovidej cesky. Zadne emoji.`;

        const ROLES = [
          { 
            id: "financak", 
            title: "Financni reditel", 
            subtitle: "& Danovy poradce", 
            initials: "FR", 
            color: "#EAB308", 
            desc: "Cashflow, dane, DPH, rozpocty, optimalizace nakladu a penez." 
          },
          { 
            id: "asistentka", 
            title: "Asistentka", 
            subtitle: "Gmail & Kalendar", 
            initials: "AS", 
            color: "#3B82F6", 
            desc: "Emaily, schuzky, organizace, hlidani terminu a administrativy." 
          },
          { 
            id: "inovator", 
            title: "Business analytik", 
            subtitle: "Strategie & Rozvoj", 
            initials: "BA", 
            color: "#22C55E", 
            desc: "Analyza, automatizace, dotace, rozvoj firmy a nove technologie." 
          },
          { 
            id: "zadavatel", 
            title: "Programator", 
            subtitle: "Claude Code & Dev", 
            initials: "PR", 
            color: "#A855F7", 
            desc: "Priprava technickych zadani pro vyvoj interni aplikace YouPlace." 
          },
          { 
            id: "stavbar", 
            title: "Stavebni specialista", 
            subtitle: "Normy & Materialy", 
            initials: "ST", 
            color: "#F97316", 
            desc: "Technologie, stavebni postupy, normy, materialy a kvalita." 
          }
        ];

        const font = "'Poppins', sans-serif";

        function AIAdvisoryBoard() {
          const [activeRole, setActiveRole] = useState(null);
          const [messages, setMessages] = useState([]);
          const [inputValue, setInputValue] = useState("");
          const [loading, setLoading] = useState(false);
          const chatEndRef = useRef(null);

          const scrollToBottom = () => {
            chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
          };

          useEffect(() => {
            scrollToBottom();
          }, [messages]);

          const sendMessage = async () => {
            if (!inputValue.trim() || loading) return;

            const userMessage = {
              role: "user",
              content: inputValue
            };

            setMessages(prev => [...prev, userMessage]);
            setInputValue("");
            setLoading(true);

            // Zde by bylo volání tvého API (Claude/Anthropic)
            // Pro účely tohoto index.html simulujeme odpověď, aby design zůstal 1:1
            setTimeout(() => {
              const aiResponse = {
                role: "assistant",
                content: `Jsem ${activeRole?.title || "Porada"}. (Zde bude skutečná odpověď z Claude API, jakmile připojíte svůj API klíč).`
              };
              setMessages(prev => [...prev, aiResponse]);
              setLoading(false);
            }, 1000);
          };

          const handleKeyDown = (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              sendMessage();
            }
          };

          if (!activeRole) {
            return (
              <div style={{ padding: "40px", maxWidth: "1200px", margin: "0 auto", height: "100%", overflowY: "auto" }}>
                <div style={{ textAlign: "center", marginBottom: "60px" }}>
                  <h1 style={{ fontFamily: font, fontWeight: 300, fontSize: "32px", color: "white", margin: 0 }}>You&Place</h1>
                  <h2 style={{ fontFamily: font, fontWeight: 600, fontSize: "42px", color: "white", margin: "5px 0" }}>Poradní sbor</h2>
                  <p style={{ fontFamily: font, opacity: 0.5, fontSize: "16px" }}>Vyberte si experta pro konzultaci nebo zahajte poradu týmu.</p>
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(350px, 1fr))", gap: "25px" }}>
                  {ROLES.map((role) => (
                    <div 
                      key={role.id}
                      onClick={() => { setActiveRole(role); setMessages([]); }}
                      style={{ 
                        background: "rgba(255,255,255,0.03)",
                        border: "1px solid rgba(255,255,255,0.08)",
                        borderRadius: "32px",
                        padding: "35px",
                        cursor: "pointer",
                        transition: "all 0.3s ease",
                        position: "relative",
                        overflow: "hidden"
                      }}
                    >
                      <div style={{ color: role.color, fontSize: "32px", fontWeight: "bold", marginBottom: "15px", fontFamily: font }}>{role.initials}</div>
                      <h3 style={{ color: "white", fontSize: "22px", margin: "0 0 5px 0", fontFamily: font }}>{role.title}</h3>
                      <p style={{ color: role.color, fontSize: "14px", fontWeight: "500", margin: "0 0 20px 0", fontFamily: font }}>{role.subtitle}</p>
                      <p style={{ color: "white", opacity: 0.5, fontSize: "14px", lineHeight: "1.6", fontFamily: font }}>{role.desc}</p>
                    </div>
                  ))}

                  <div 
                    onClick={() => { setActiveRole({ id: 'porada', title: 'Porada týmu', initials: 'PS', color: '#fff' }); setMessages([]); }}
                    style={{ 
                      background: "linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%)",
                      border: "1px solid rgba(255,255,255,0.15)",
                      borderRadius: "32px",
                      padding: "35px",
                      cursor: "pointer",
                      display: "flex",
                      flexDirection: "column",
                      justifyContent: "center",
                      alignItems: "center",
                      textAlign: "center"
                    }}
                  >
                    <div style={{ color: "white", fontSize: "32px", fontWeight: "bold", marginBottom: "15px", fontFamily: font }}>PS</div>
                    <h3 style={{ color: "white", fontSize: "22px", margin: "0 0 5px 0", fontFamily: font }}>Porada týmu</h3>
                    <p style={{ color: "white", opacity: 0.5, fontSize: "14px", fontFamily: font }}>Společná diskuze všech 5 expertů najednou.</p>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: "#0d0d0f" }}>
              {/* Header */}
              <div style={{ height: "80px", borderBottom: "1px solid rgba(255,255,255,0.05)", display: "flex", alignItems: "center", padding: "0 40px", justifyContent: "space-between" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "20px" }}>
                  <div onClick={() => setActiveRole(null)} style={{ cursor: "pointer", padding: "10px", borderRadius: "50%", background: "rgba(255,255,255,0.05)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                  </div>
                  <div>
                    <h2 style={{ color: "white", margin: 0, fontSize: "18px", fontFamily: font }}>{activeRole.title}</h2>
                    <p style={{ color: activeRole.color, margin: 0, fontSize: "12px", fontFamily: font }}>{activeRole.subtitle || "Týmová diskuze"}</p>
                  </div>
                </div>
              </div>

              {/* Chat Container */}
              <div style={{ flex: 1, overflowY: "auto", padding: "40px" }}>
                <div style={{ maxWidth: "900px", margin: "0 auto" }}>
                  {messages.map((msg, idx) => (
                    <div key={idx} style={{ marginBottom: "30px", display: "flex", flexDirection: "column", alignItems: msg.role === "user" ? "flex-end" : "flex-start" }}>
                      <div style={{ 
                        background: msg.role === "user" ? "white" : "rgba(255,255,255,0.05)",
                        color: msg.role === "user" ? "black" : "white",
                        padding: "20px 25px",
                        borderRadius: msg.role === "user" ? "24px 24px 4px 24px" : "24px 24px 24px 4px",
                        maxWidth: "80%",
                        fontSize: "15px",
                        lineHeight: "1.6",
                        fontFamily: font,
                        whiteSpace: "pre-wrap"
                      }}>
                        {msg.content}
                      </div>
                    </div>
                  ))}
                  {loading && (
                    <div style={{ color: "white", opacity: 0.3, fontSize: "14px", fontFamily: font }}>Expert odpovídá...</div>
                  )}
                  <div ref={chatEndRef} />
                </div>
              </div>

              {/* Input Area */}
              <div style={{ padding: "40px", borderTop: "1px solid rgba(255,255,255,0.05)" }}>
                <div style={{ maxWidth: "900px", margin: "0 auto", position: "relative", background: "white", borderRadius: "20px", padding: "8px 15px", display: "flex", alignItems: "center", gap: "15px" }}>
                   <input 
                    type="text" 
                    value={inputValue}
                    onChange={(e) => setInputValue(e.target.value)}
                    onKeyDown={handleKeyDown}
                    placeholder={`Napište zprávu pro: ${activeRole.title}...`}
                    style={{ flex: 1, border: "none", outline: "none", padding: "15px", fontSize: "15px", fontFamily: font, color: "#1a1a1a", background: "transparent" }}
                  />
                  <button 
                    onClick={sendMessage}
                    disabled={loading || !inputValue.trim()}
                    style={{ 
                      width: "48px", height: "48px", borderRadius: "14px", 
                      background: loading || !inputValue.trim() ? "rgba(26,26,26,0.1)" : "#1a1a1a",
                      border: "none", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer"
                    }}
                  >
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                  </button>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AIAdvisoryBoard />);
    </script>
</body>
</html>
